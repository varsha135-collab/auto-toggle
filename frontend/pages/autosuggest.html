<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #top-header{
            position:fixed;
            top:20px;
            left:20px;
        }
        #status-type{
            position:fixed;
            top:20px;
            right:20px;
        }
        #home-page{
            text-align:center;
            margin: 200px;

        }
        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: black; 
        }

        
        h1 .blue-text {
            color: blue; 
        }
        p{
            color:grey;
        }
        .search-wrapper {
        display: flex;
        align-items: center;
        border: 2px solid black;
        border-radius: 24px;      
        padding: 6px 16px;
        background-color: white;   
        width: 100%;
        margin: 0;    
        box-sizing: border-box;      
        }
        .search-container {
            position: relative;
            max-width: 700px;  
            margin: 20px auto; 
        }
        #search-bar {
            flex: 1;                   
            border: none;              
            outline: none;             
            padding: 10px 0;
            font-size: 16px;
            background: transparent;   
        }
        #suggestion-box{
            margin-top: 8px;
            text-align: left;
        }
        .suggestion-item{
            border: 1px solid gray;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 5px;
        }
    </style>



</head>
<body>
    <div id="top-header">

            <span class="gear">&#x2699;</span>
    </div>
    <div id="status-type">
        
            <span class="status-text">&#8226;Online</span>
            <span class="separator">|</span>
            <span class="clock-icon">&#8226;&#x23F0;</span>
            <span id="live-clock" class="clock-text"></span>
            <span class="ms-label">ms</span>
        

    </div>
    <div id="home-page"class="container">
    

            <h1><span class="blue-text">Being</span>Infinity</h1>
            <p>One million phrases.Four algorithms.Prefix Based auto Suggest.</p>
            <div class="search-container">
                <div class="search-wrapper">
                    <span class="search-lens">&#128269;</span>
                    <input type="text" id="search-bar" placeholder="Start typing to search phrases">
                </div>
                
                <div id="suggestion-box">
                
                </div>
            </div>
    </div>
    <script>
        var searchBox = document.getElementById("search-bar");
        var suggestionBox = document.getElementById("suggestion-box");

        searchBox.addEventListener("input", function(){
            // 1 : Get user typed text
            var userInput = searchBox.value;
            if(userInput.trim() === ""){

            }
            else{
                var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url3 = "&algorithm=brute&limit=10&weighted=false";
                var url = url1 + userInput + url3;
                // 2 : Make api call to get suggestion 
                fetch(url).
                    then(function(response){
                        return response.json();
                    })
                    .then(function(data){
                        console.log(data);

                        // 3 : Display data in HTML
                        var resultsArray = data.results;
                        var htmlResults = "";
                        for(var i=0; i< resultsArray.length; i++)
                        {
                            
                            htmlResults += "<div class='suggestion-item'>" + resultsArray[i].text + "</div>";
                        }
                        // var suggestionBox = document.getElementById("suggestion-box");
                        suggestionBox.innerHTML = htmlResults;
                        
                    })

                
            }


        })
    </script>
        
    
</body>
