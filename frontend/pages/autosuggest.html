<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #top-header{
            position:fixed;
            top:20px;
            left:20px;
        }
        #status-type{
            position:fixed;
            top:20px;
            right:20px;
        }
        #home-page{
            text-align:center;
            margin: 200px;

        }
        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: black; 
        }

        
        h1 .blue-text {
            color: blue; 
        }
        p{
            color:blue;
        }
        .search-wrapper {
        display: flex;
        align-items: center;
        border: 2px solid black;
        border-radius: 24px;      
        padding: 6px 16px;
        background-color: white;   
        width: 100%;
        margin: 0;    
        box-sizing: border-box;      
        }
        .search-container {
            position: relative;
            max-width: 500px;  
            margin: 20px auto; 
        }
        #search-bar {
            flex: 1;                   
            border: none;              
            outline: none;             
            padding: 10px 0;
            font-size: 16px;
            background: transparent;   
        }
        #suggestion-box{
        position: absolute;
        top: 100%;                 
        left: 0;
        right: 0;                  
        margin-top: 2px;         
        background: white;
        border: 2px solid black;   
              
        padding: 15px;
        text-align:center;          
        box-sizing: border-box;    
                       
    }
    </style>



</head>
<body>
    <div id="top-header">

            <span class="gear">&#x2699;</span>
    </div>
    <div id="status-type">
        
            <span class="status-text">&#8226;Online</span>
            <span class="separator">|</span>
            <span class="clock-icon">&#8226;&#x23F0;</span>
            <span id="live-clock" class="clock-text"></span>
            <span class="ms-label">ms</span>
        

    </div>
    <div id="home-page"class="container">
    

            <h1><span class="blue-text">Being</span>Infinity</h1>
            <p>One million phrases.Four algorithms.Prefix Based auto Suggest.</p>
            <div class="search-container">
                <div class="search-wrapper">
                    <span class="search-lens">&#128269;</span>
                    <input type="text" id="search-bar" placeholder="Start typing to search phrases">
                </div>
                
                <div id="suggestion-box">
                    Suggestion Box
                </div>
            </div>
    </div>
        
    
</body>
</html>
